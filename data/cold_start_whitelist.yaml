whitelist_name: ai_cfd_cold_start_official_tutorial_whitelist
version: v1
selection_rules:
  goal: Seed an AI-CFD agent with official, reproducible, low-ambiguity tutorials before moving to papers and community cases.
  preferred_order:
    - core_seed
    - bridge
    - breadth
  mesh_strategy_legend:
    A: ready_mesh_provided
    B: mesh_or_regions_built_from_case_scripts_or_geometry
cases:
  - id: OF-01
    rank: 1
    platform: OpenFOAM
    tier: core_seed
    dimension: 2D
    difficulty: basic
    case_name: lid_driven_cavity
    source_location:
      local_case_path: "$FOAM_TUTORIALS/incompressible/icoFoam/cavity/cavity"
      repo_case_dir: "https://github.com/OpenFOAM/OpenFOAM-13/tree/master/tutorials/incompressibleFluid/cavity"
      tutorial_page: "https://www.openfoam.com/documentation/tutorial-guide/2-incompressible-flow/2.1-lid-driven-cavity-flow"
    source_provenance: Official OpenFOAM tutorial guide with explicit 2D cavity workflow.
    verification_basis: official_tutorial_page
    mesh_strategy: B
    mesh_details: Uses case-provided blockMeshDict; generate a single-cell-thick 2D mesh with empty front/back boundaries.
    solver_command: "blockMesh && icoFoam"
    success_criteria: blockMesh writes constant/polyMesh; icoFoam advances without FATAL ERROR and writes nonzero time folders containing U and p.
    why_whitelisted: Best first OpenFOAM seed; tiny geometry, explicit boundaries, ideal for AI parsing of fields and dictionaries.

  - id: OF-02
    rank: 2
    platform: OpenFOAM
    tier: core_seed
    dimension: 2D
    difficulty: basic
    case_name: backward_facing_step_steady
    source_location:
      local_case_path: "$FOAM_TUTORIALS/incompressibleFluid/pitzDailySteady"
      repo_case_dir: "https://github.com/OpenFOAM/OpenFOAM-13/tree/master/tutorials/incompressibleFluid/pitzDailySteady"
      tutorial_page: "https://doc.cfd.direct/openfoam/user-guide-v13/backwardstep"
    source_provenance: Official OpenFOAM user guide backward-facing-step tutorial.
    verification_basis: official_user_guide
    mesh_strategy: B
    mesh_details: Case provides blockMeshDict and 2D setup via empty boundaries; mesh generated before solve.
    solver_command: "blockMesh && foamRun"
    success_criteria: Case runs to completion and writes result times; post-process speed magnitude successfully with foamPostProcess -func 'mag(U)'.
    why_whitelisted: Canonical internal laminar benchmark; teaches inlet profile, reattachment, and validation-oriented setup.

  - id: OF-03
    rank: 6
    platform: OpenFOAM
    tier: core_seed
    dimension: 2D
    difficulty: basic_to_intermediate
    case_name: cylinder_crossflow
    source_location:
