      repo_case_dir: "https://github.com/OpenFOAM/OpenFOAM-13/tree/master/tutorials/incompressibleFluid/cylinder"
    source_provenance: Official OpenFOAM-13 tutorial case directory and README.
    verification_basis: official_repo_case_dir
    mesh_strategy: B
    mesh_details: Case directory contains 0/ constant/ system/ plus Allrun; parameterized blockMeshDict scales the domain and mesh with cylinder diameter.
    solver_command: "./Allrun"
    success_criteria: Allrun completes and writes log files without FOAM FATAL ERROR; resulting field shows cylinder wake / pressure gradient around obstacle.
    why_whitelisted: Good bridge from cavity/step to external bluff-body flow; README also explains how to increase Re and switch to transient/turbulent modes.

