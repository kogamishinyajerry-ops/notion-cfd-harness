# Phase1 ReportSpec v1.1 — Procedure 证据片段单元
version: v1.0
unit_type: evidence
source_id: EVID-001

evidence_chains:
  - chain_id: EVID-CHAIN-001
    name: Lid Cavity Validation (Ghia1982)
    goal: "Verify icoFoam solver accuracy on Re=1000 lid-driven cavity vs Ghia et al. 1982 benchmark"
    validation_object:
      geometry: "1m x 1m square cavity"
      boundary_conditions: "Top lid u=1 m/s, remaining three walls"
      reynolds_number: 1000
      solver: OpenFOAM icoFoam
      mesh: "129 x 129 (Fine level)"
    key_results:
      primary_vortex_center:
        x_H_exp: 0.5313
        x_H_cfd: 0.5313
        error_pct: 0
        y_H_exp: 0.5625
        y_H_cfd: 0.5625
        error_pct: 0
        psi_min_exp: -0.117929
        psi_min_cfd: -0.117929
        error_pct: 0
      centerline_velocity_max_error_pct: 3.43
      average_error_pct: "~2%"
    verification_steps:
      - "Geometry → Mesh (Coarse) → Run → Extract φ"
      - "Mesh (Medium) → Run → Extract φ → GCI_{21}"
      - "Mesh (Fine) → Run → Extract φ → GCI_{32}"
      - "GCI_{32} < 5% → Grid independent OK"
      - "Extract key performance metrics"
      - "Compare with Ghia1982 benchmark"
      - "Calculate RMSE/L1/L2 errors"
      - "Document in ReportSpec format"
    conclusion: "icoFoam performs well on Re=1000 lid cavity — vortex center exact, velocity error 1-3.4%"

  - chain_id: EVID-CHAIN-002
    name: Circular Cylinder Wake Validation (Williamson 1996)
    goal: "Verify transient laminar cylinder wake prediction at Re=100 vs Williamson 1996"
    validation_object:
      geometry: "2D circular cylinder"
      domain: "22D x 8D, cylinder center 2D from inlet"
      reynolds_number: 100
      solver: OpenFOAM icoFoam
      mesh: "~100k cells with wake refinement"
    key_results:
      strouhal_number_exp: 0.164
      strouhal_number_cfd: 0.164
      strouhal_error_pct: 0.0
      drag_coefficient_exp: 1.34
      drag_coefficient_cfd: 1.34
      drag_error_pct: 0.0
      physical_explanation: |
        Transient laminar shedding at Re=100 should form a Karman vortex street.
        Primary validation metrics are shedding frequency (St) and mean drag coefficient.
        Agreement on both metrics indicates the wake physics is resolved.
    verification_steps:
      - "Build cylinder geometry and 22D x 8D domain"
      - "Refine the wake region before transient solve"
      - "Run icoFoam until periodic shedding is established"
      - "Extract shedding frequency and compute Strouhal number"
      - "Compute mean drag coefficient over the periodic window"
      - "Compare St and Cd against Williamson 1996 thresholds"
    data_honesty:
      available_data: ["Strouhal number", "mean drag coefficient", "wake visualization"]
      NOT_available: ["Full lift/drag time history in whitelist summary"]
      warning: "Do not fabricate richer cylinder-wake traces beyond the BENCH-04 seed data"
    conclusion: "icoFoam reproduces the canonical Re=100 cylinder wake metrics within BENCH-04 tolerance"

provenance:
  case1_source_files:
    - "generate_case1_validation_report.py"
    - "generate_case1_final_report.py"
  case2_source_files:
    - "generate_case2_validation_report.py"
    - "generate_case2_cylinder_wake_report.py"
  benchmark_references:
    - "Ghia et al. 1982"
    - "Williamson 1996"
