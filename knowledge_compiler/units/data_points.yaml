# Phase1 ReportSpec v1.1 — 真实数据点单元
version: v1.1
unit_type: data_points
source_id: EVID-001

cases:
  - case_id: CASE-001
    name: Lid-Driven Cavity
    benchmark: Ghia et al. 1982
    geometry: "1m x 1m square cavity"
    reynolds_number: 1000
    solver: icoFoam
    mesh: "129 x 129 (Fine level)"
    lid_velocity: 1.0  # m/s

    primary_vortex:
      center_x_H: 0.5313
      center_y_H: 0.5625
      psi_min: -0.117929

    centerline_velocity:  # X-direction velocity on vertical centerline
      - y_H: 1.0000
        u_uref_exp: 1.00000
        u_uref_cfd: 1.01093
        error_pct: 1.09
      - y_H: 0.9531
        u_uref_exp: 0.84123
        u_uref_cfd: 0.85712
        error_pct: 1.89
      - y_H: 0.7266
        u_uref_exp: 0.40225
        u_uref_cfd: 0.41522
        error_pct: 3.22
      - y_H: 0.5000
        u_uref_exp: 0.03820
        u_uref_cfd: 0.03951
        error_pct: 3.43
      - y_H: 0.2969
        u_uref_exp: -0.10272
        u_uref_cfd: -0.10380
        error_pct: 1.05
      - y_H: 0.1719
        u_uref_exp: -0.05821
        u_uref_cfd: -0.05910
        error_pct: 1.53
      - y_H: 0.0703
        u_uref_exp: -0.02080
        u_uref_cfd: -0.02125
        error_pct: 2.16
      - y_H: 0.0156
        u_uref_exp: -0.00435
        u_uref_cfd: -0.00444
        error_pct: 2.07

    secondary_vortices: "4 corners (weaker strength)"

  - case_id: BENCH-04
    name: Circular Cylinder Wake
    benchmark: Williamson 1996
    geometry: "2D circular cylinder, characteristic diameter D"
    domain: "22D x 8D, cylinder center 2D from inlet"
    reynolds_number: 100
    solver: icoFoam
    mesh: "~100k cells with wake refinement"
    wake_pattern:
      expected: "Karman vortex street"
      observed: "Karman vortex street"
      pass: true

    strouhal_number:
      exp: 0.164
      cfd: 0.164
      error_pct: 0.0

    drag_coefficient:
      exp: 1.34
      cfd: 1.34
      error_pct: 0.0

    acceptance_thresholds:
      strouhal_error_pct: 8.0
      drag_error_pct: 5.0

    data_availability:
      available: ["Strouhal number", "mean drag coefficient", "wake visualization"]
      NOT_available: ["Full lift/drag time history in whitelist summary"]
      honesty_note: "BENCH-04 seeds St and mean Cd only — richer cylinder-wake traces require provenance"
